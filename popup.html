<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bonusradar</title>
    <style>
      body {
        margin: 0;
        width: 240px;
        font: 13px/1.4 system-ui, -apple-system, sans-serif;
        color: #0b1e3a;
        background: #fff;
      }
      .header {
        padding: 12px 14px 8px;
        font-weight: 700;
        font-size: 14px;
      }
      .body {
        padding: 0 14px 14px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #5a6b85;
        margin-bottom: 4px;
      }
      select {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #cbd4e6;
        font: inherit;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #5a6b85;
      }
    </style>
  </head>
  <body>
    <div class="header">Bonusradar</div>
    <div class="body">
      <label for="country">Home country</label>
      <select id="country">
        <option value="">Auto-detect</option>
        <option value="SE">Sweden</option>
        <option value="NO">Norway</option>
        <option value="DK">Denmark</option>
      </select>
      <div class="status" id="status"></div>
    </div>
    <script src="lib/match.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
